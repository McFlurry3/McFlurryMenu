<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">

  <style>
    body {
      background: rgba(0,0,0,0);
      margin: 0;
      font-family: Arial;
    }

    #menu {
      width: 260px;
      padding: 0px 10px 8px;
      background: #1e1e1e;
      border-radius: 12px;
      color: white;
      box-shadow: 0 0 10px #000;
      display: flex;
      flex-direction: column;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #4CAF50;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    input[type="number"] {
      padding: 8px;
      border-radius: 8px;
      border: none;
      margin-top: 1px;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }

    .input-row button {
      flex: 1;
      width: 45%;
      margin-top: 0;
      order: 1;
    }

    .input-row input[type="number"] {
      flex: 1;
      width: 45%;
      order: 2;
    }

    .label-row {
      margin-top: 7px;
      margin-bottom: 0px;
      font-size: 13px;
      color: #ccc;
    }

    .tab {
      display: none;
    }

    .tab.active {
      display: block;
    }

    .tab-buttons {
      display: flex;
      justify-content: space-around;
      margin-top: -12px;
      margin-bottom: 5px;
    }

    .tab-buttons button {
      flex: 1;
      background: #333;
      width: 20%;
      font-size: 12px;
      padding: 8px;
    }

    .tab-buttons button.active {
      background: #4CAF50;
    }

    #menu-footer {
      margin-top: auto;
      text-align: center;
      font-size: 10px;
      color: #aaa;
      padding-top: 8px;
    }

    .freeze-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .freeze-grid button {
      width: 100%;
      margin-top: 0;
    }

    .dev-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
    }

    .dev-row button {
      flex: 1.2;
      margin-top: 0;
      padding: 6px;
      font-size: 11px;
    }

    .dev-row input[type="number"] {
      flex: 0.8;
      padding: 4px;
      font-size: 11px;
    }

    .dev-row .full-button {
      padding: 10px;
      font-size: 14px;
    }
  </style>
</head>

const DEV2_PASSWORD = "TheMeeting";

    const TIME_NOT_FOUND_ALERT = "Time address not found! Make sure to scan for time before using anything in the \"Time\" section or the \"Other\" section";

    function showTimeNotFoundAlert() {
      alert(TIME_NOT_FOUND_ALERT);
    }

    function showTab(id) {
      document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.tab-buttons button').forEach(btn => btn.classList.remove('active'));

      document.getElementById(id).classList.add('active');

      const tabBtn = document.getElementById(id + 'TabBtn');
      if (tabBtn) {
        tabBtn.classList.add('active');
      }
    }

    function AutoScanTimeStatic() {
      h5gg.require(7.8);
      h5gg.clearResults();

      h5gg.searchNumber("2139095040", "I32", "0x0", "0x200000000");
      h5gg.searchNearby("1101004800", "I32", "0x10");

      let count = h5gg.getResultsCount();
      if (count <= 0) {
        console.log("No timeStatic found");
        return;
      }

      let results = h5gg.getResults(count);
      let timeStatic = results[0].address;

      timeAddress = "0x" + (Number(timeStatic) - 0x9A0).toString(16);
      shotClockAddress = "0x" + (Number(timeAddress) + 0x30).toString(16);

      console.log("timeStatic:", timeStatic);
      console.log("timeAddress:", timeAddress);
      console.log("shotClockAddress:", shotClockAddress);
    }

    function getInstantAddress() {
      if (!timeAddress) return null;
      return "0x" + (Number(timeAddress) - 0x367D120).toString(16);
    }

    function setupInstantWin() {
      h5gg.require(7.8);
      instantAddress = getInstantAddress();
      if (instantAddress) {
        console.log("Instant win address saved:", instantAddress);
      }

      instantWinInterval = setInterval(function() {
        if (instantAddress) {
          h5gg.setValue(instantAddress, "1", "I32");
          console.log("Instant win activated");
        }
      }, 1);
    }
    
    function openDev2() {
  let pass = prompt("Enter password:");
  if (pass === null) return;

  if (pass === DEV2_PASSWORD) {
    dev2Unlocked = true;
    showTab('dev2');
  } else {
    alert("Wrong password.");
  }
}

    function ToggleInstantWin() {
      instantWinEnabled = !instantWinEnabled;
      const btn = document.getElementById("instantWinBtn");

      if (instantWinEnabled) {
        btn.textContent = "Instant Win (ON)";
        if (!timeAddress) AutoScanTimeStatic();
        setupInstantWin();
      } else {
        btn.textContent = "Instant Win (OFF)";
        if (instantWinInterval) {
          clearInterval(instantWinInterval);
          instantWinInterval = null;
        }
        if (instantAddress) {
          h5gg.setValue(instantAddress, "-1", "I32");
        }
      }
    }

    async function InstantWinFlash() {
      if (!timeAddress) {
        AutoScanTimeStatic();
      }
      instantAddress = getInstantAddress();

      if (!instantAddress) {
        alert("No instant win address found!");
        return;
      }

      var delay = parseInt(document.getElementById("flashDelay").value);
      if (isNaN(delay) || delay < 0) delay = 100;

      function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
      }

      async function win(address) {
        h5gg.setValue(address, "1", "I32");
        await sleep(delay);
        h5gg.setValue(address, "-1", "I32");
      }

      await win(instantAddress);
      console.log("Instant win flashed at address:", instantAddress);
    }

    async function InstantWin15Loop() {
      const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));
      console.log("InstantWin15 loop started");

      while (instantWin15Enabled) {
        await sleep(50);
        if (!timeAddress) {
          AutoScanTimeStatic();
        }
        if (!instantAddress) {
          instantAddress = getInstantAddress();
        }

        if (timeAddress && instantAddress) {
          let currentVal = parseFloat(h5gg.getValue(timeAddress, "F64"));
          if (currentVal >= 10.0 && currentVal <= 12.0) {
            h5gg.setValue(instantAddress, "1", "I32");
            await sleep(500);
            h5gg.setValue(instantAddress, "-1", "I32");
            console.log("Instant win triggered at 15s");

            if (timeAddress) {
              h5gg.setValue(timeAddress, "0.0", "F64");
              console.log("Game time reset to 0 after instant win");
            }
          }
        }
      }
      console.log("InstantWin15 loop stopped");
    }

          AutoScanTimeStatic();
        }
        InstantWin15Loop();
      } else {

    }

      if (!timeAddress) {
        showTimeNotFoundAlert();
        return;
      }
      h5gg.setValue(timeAddress, String(newTime), "F64");
      console.log("Time value set to:", newTime);
      alert("Time set to: " + newTime);
    }

    async function EndGameAfter60sLoop() {
      const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));
      while (endGame60Enabled) {
        await sleep(50);

        if (!timeAddress) {
          let scanValue = document.getElementById("scanValue").value;
          if (scanValue === "" || isNaN(scanValue)) scanValue = "120.0";
          h5gg.require(7.8);
          h5gg.clearResults();
          h5gg.searchNumber(scanValue, "F64", "0x0", "0x200000000");
          h5gg.searchNearby("24.0", "F64", "0x100");
          let count = h5gg.getResultsCount();
          if (count > 0) {
            let results = h5gg.getResults(1);
            timeAddress = results[0].address;
          }
        }

        if (!timeAddress) continue;

        quarterAddress = "0x" + (Number(timeAddress) - 0x64).toString(16);

        let currentValStr = h5gg.getValue(timeAddress, "F64");
        let currentVal = parseFloat(currentValStr);
        if (isNaN(currentVal)) continue;

        let didInstantWin = false;
        if (currentVal >= 58.0 && currentVal <= 59.0 && quarterAddress) {
          let quarterValStr = h5gg.getValue(quarterAddress, "I32");
          let quarterVal = parseInt(quarterValStr);
          if (quarterVal === 4) {
            if (!instantAddress) {
              instantAddress = getInstantAddress();
            }

            if (instantAddress) {
              h5gg.setValue(instantAddress, "1", "I32");
              await sleep(500);
              h5gg.setValue(instantAddress, "-1", "I32");
              didInstantWin = true;
            }
          }
        }

        if (didInstantWin) continue;

        if (currentVal < 67 && quarterAddress) {
          let qValStr = h5gg.getValue(quarterAddress, "I32");
          let qVal = parseInt(qValStr);
          if (qVal !== 4) {
            h5gg.setValue(timeAddress, "0", "F64");
          }
        }
      }
    }

        if (!timeAddress) {
          showTimeNotFoundAlert();
        }
        EndGameAfter60sLoop();

    async function AlwaysWinRTCLoop() {
      const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

      while (alwaysWinRTCEnabled) {
        await sleep(50);

        if (!timeAddress) {
          h5gg.require(7.8);
          h5gg.clearResults();
          h5gg.searchNumber("180.0", "F64", "0x0", "0x200000000");
          h5gg.searchNearby("24.0", "F64", "0x100");
          let count = h5gg.getResultsCount();
          if (count > 0) {
            let results = h5gg.getResults(1);
            timeAddress = results[0].address;
          }
        }

        let currentVal = parseFloat(h5gg.getValue(timeAddress, "F64"));
        if (isNaN(currentVal)) continue;

        let quarterAddress = "0x" + (Number(timeAddress) - 0x64).toString(16);
        let quarterVal = parseInt(h5gg.getValue(quarterAddress, "I32"));

        if (quarterVal === 4 && currentVal >= 10.0 && currentVal <= 12.0) {
          if (!instantAddress) {
            instantAddress = getInstantAddress();
          }

          if (instantAddress) {
            h5gg.setValue(instantAddress, "1", "I32");
            await sleep(100);
            h5gg.setValue(instantAddress, "-1", "I32");
          }
        }
      }
    }
	
	function ToggleAlwaysWinFastBreak() {
	  alwaysWinFastBreakEnabled = !alwaysWinFastBreakEnabled;
          const btn = document.getElementById("alwaysWinFastBreakBtn");

      if (alwaysWinFastBreakEnabled) {

        if (!timeAddress) {
          showTimeNotFoundAlert();
          alwaysWinFastBreakEnabled = false;
          btn.textContent = "Always Win FastBreak (OFF)";
          return;
        }

        alwaysWinFastBreakAddress = "0x" + (Number(timeAddress) - 0x2F9DF10).toString(16);

        alwaysWinFastBreakInterval = setInterval(function () {
          if (!timeAddress || !alwaysWinFastBreakAddress) return;
    
          let shotClockVal = parseFloat(h5gg.getValue(shotClockAddress, "F64"));
          let waveVal = parseInt(h5gg.getValue(alwaysWinFastBreakAddress, "I32"));
    
          if (!isNaN(shotClockVal) && !isNaN(waveVal)) {
            if (waveVal === 6 && shotClockVal > 4 && shotClockVal < 6) {
              InstantWinFlash();
              h5gg.setValue(alwaysWinFastBreakAddress, "0", "I32");
            }
          }
        }, 50);
      } else {
        btn.textContent = "Always Win FastBreak (OFF)";
        if (alwaysWinFastBreakInterval) {
          clearInterval(alwaysWinFastBreakInterval);
          alwaysWinFastBreakInterval = null;
        }
        alwaysWinFastBreakAddress = null;
      }
    }

    function setupAlwaysYourBall() {
      if (!shotClockAddress) {
        AutoScanTimeStatic();
      }
      if (!shotClockAddress) {
        showTimeNotFoundAlert();
        alwaysYourBallEnabled = false;
        document.getElementById("alwaysYourBallBtn").textContent = "Always Your Ball (OFF)";
        return;
      }

      const shotClockAddrNum = Number(shotClockAddress);
      const register_A = "0x" + (shotClockAddrNum - 0x60).toString(16);
      const register_B = "0x" + (shotClockAddrNum - 0x58).toString(16);

      alwaysYourBallInterval = setInterval(function() {
        let yourTeamId = h5gg.getValue(register_A, "I32");
        h5gg.setValue(register_B, yourTeamId, "I32");
      }, 1);
    }

    function startMatchObservationEngine() {
      h5gg.require(7.8);
      if (!shotClockAddress) {
        showTimeNotFoundAlert();
        return;
      }

      const shotClockAddrNum = Number(shotClockAddress);
      const register_A = "0x" + (shotClockAddrNum - 0x60).toString(16);
      const register_B = "0x" + (shotClockAddrNum - 0x58).toString(16);
      const register_C = shotClockAddress;

      let stored_alpha = null;
      let stored_beta = null;
      let lockout_status = false;
      let initializing_delay = false;

      if (match_observation_engine) {
        clearInterval(match_observation_engine);
      }

      match_observation_engine = setInterval(function() {
        let live_hex_1 = h5gg.getValue(register_A, "I32");
        let live_hex_2 = h5gg.getValue(register_B, "I32");

        if (!(live_hex_1 > 0 || live_hex_1 < 0) && !(live_hex_2 > 0 || live_hex_2 < 0)) {
          stored_alpha = null;
          stored_beta = null;
          lockout_status = false;
          initializing_delay = false;
          return;
        }

        if (stored_alpha === null && (live_hex_1 > 0 || live_hex_1 < 0)) {
          if ((live_hex_2 > 0 || live_hex_2 < 0) && live_hex_1 !== live_hex_2) {
            initializing_delay = true;
            stored_alpha = live_hex_1;
            stored_beta = live_hex_2;
            setTimeout(function() {
              let re_verify_1 = h5gg.getValue(register_A, "I32");
              let re_verify_2 = h5gg.getValue(register_B, "I32");
              if ((re_verify_1 > 0 || re_verify_1 < 0) && (re_verify_2 > 0 || re_verify_2 < 0)) {
                stored_alpha = re_verify_1;
                stored_beta = re_verify_2;
                initializing_delay = false;
              }
            }, 2000);
          }
        }

        if (!initializing_delay && live_hex_1 !== 0 && live_hex_1 !== stored_alpha && live_hex_1 !== stored_beta) {
          if (live_hex_2 !== 0) {
            stored_alpha = live_hex_1;
            stored_beta = live_hex_2;
            lockout_status = false;
          }
        }

        if (!initializing_delay && stored_beta !== null && live_hex_1 === stored_beta && live_hex_1 !== live_hex_2) {
          if (!lockout_status) {
            h5gg.setValue(register_C, "0", "F64");
            lockout_status = true;
          }
        } else if (live_hex_1 === stored_alpha) {
          lockout_status = false;
        }
      }, 150);
    }

    function ScanForCurry() {
      h5gg.require(7.8);
      h5gg.clearResults();
      h5gg.searchNumber("30306", "I32", "0x0", "0x200000000");
      h5gg.searchNearby("1612", "I32", "0x8");
      let count = h5gg.getResultsCount();
      if (count > 0) {
        let results = h5gg.getResults(1);
        if (results[0].value == 30306) {
          curryAddress = results[0].address;
          themeAddress = "0x" + (Number(curryAddress) + 0xE0).toString(16);
          tierAddress = "0x" + (Number(curryAddress) + 0xCC).toString(16);
          pwrAddress = "0x" + (Number(curryAddress) + 0xE8).toString(16);
          alert(
            "Curry found.\n\n" +
            "Curry address: " + curryAddress + "\n" +
            "Theme address: " + themeAddress + "\n" +
            "Tier address: " + tierAddress + "\n" +
            "PWR address: " + pwrAddress
          );
        } else {
          alert("First result was not 30306.");
        }
      } else {
        alert("No Curry results found.");
      }
    }

    function ScanTourney() {
      let input = document.getElementById("tourneyTierInput").value;
      if (input === "" || isNaN(input)) {
        alert("Enter a valid tourney tier value.");
        return;
      }

      tourneyTierVal = parseInt(input);

      h5gg.require(7.8);
      h5gg.clearResults();
      h5gg.searchNumber("1115187028", "I32", "0x0", "0x200000000");
      h5gg.searchNearby(String(tourneyTierVal), "I32", "0x1C");

      let count = h5gg.getResultsCount();
      if (count > 0) {
        let results = h5gg.getResults(1);
        tourneyTierAddr = results[0].address;

    function ToggleAlwaysSim() {
      alwaysSimEnabled = !alwaysSimEnabled;

      if (alwaysSimEnabled) {

        if (!tourneyTierAddr) {
          alert("Scan Tourney first.");
          alwaysSimEnabled = false;
          btn.textContent = "Always Sim (OFF)";
          return;
        }

        alwaysSimAddr = "0x" + (Number(tourneyTierAddr) + 0x8).toString(16);

        if (alwaysSimInterval) {
          clearInterval(alwaysSimInterval);
        }

        alwaysSimInterval = setInterval(function () {
          if (alwaysSimAddr) {
            h5gg.setValue(alwaysSimAddr, "5", "I32");
          }
        }, 10);
      } else {
        btn.textContent = "Always Sim (OFF)";
        if (alwaysSimInterval) {
          clearInterval(alwaysSimInterval);
          alwaysSimInterval = null;
        }
        alwaysSimAddr = null;
      }
    }
