<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>McFlurry's Hacks V5.4!</title>
  <script src="h5gg.js"></script>
  <style>
    body {
      background: rgba(0,0,0,0);
      margin: 0;
      font-family: Arial;
    }

    #menu {
      width: 260px;
      padding: 0px 10px 8px;
      background: #1e1e1e;
      border-radius: 12px;
      color: white;
      box-shadow: 0 0 10px #000;
      display: flex;
      flex-direction: column;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #4CAF50;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    input[type="number"] {
      padding: 8px;
      border-radius: 8px;
      border: none;
      margin-top: 1px;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }

    .input-row button {
      flex: 1;
      width: 45%;
      margin-top: 0;
      order: 1;
    }

    .input-row input[type="number"] {
      flex: 1;
      width: 45%;
      order: 2;
    }

    .label-row {
      margin-top: 7px;
      margin-bottom: 0px;
      font-size: 13px;
      color: #ccc;
    }

    .tab {
      display: none;
    }

    .tab.active {
      display: block;
    }

    .tab-buttons {
      display: flex;
      justify-content: space-around;
      margin-top: -12px;
      margin-bottom: 5px;
    }

    .tab-buttons button {
      flex: 1;
      background: #333;
      width: 20%;
      font-size: 12px;
      padding: 8px;
    }

    .tab-buttons button.active {
      background: #4CAF50;
    }

    #menu-footer {
      margin-top: auto;
      text-align: center;
      font-size: 10px;
      color: #aaa;
      padding-top: 8px;
    }

    .freeze-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .freeze-grid button {
      width: 100%;
      margin-top: 0;
    }

    .dev-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
    }

    .dev-row button {
      flex: 1.2;
      margin-top: 0;
      padding: 6px;
      font-size: 11px;
    }

    .dev-row input[type="number"] {
      flex: 0.8;
      padding: 4px;
      font-size: 11px;
    }

    .dev-row .full-button {
      padding: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="menu">
    <h3>Hacks soon??? 🥹</h3>

	</button>
  </div>
  </div>
</div>
</body>
</html>
